<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>骑士对决</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0a0a1a;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #game-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
    </style>
</head>
<body>
    <div id="game-container"><canvas id="game-canvas"></canvas></div>
    <script>
        // 手机端检测
        (function(){
            window._gameRotated = false;
            window._isMobile = false;
            function check(){
                window._isMobile = ('ontouchstart' in window && window.innerWidth < 1024);
                if(window._isMobile && screen.orientation && screen.orientation.lock){
                    screen.orientation.lock('landscape').catch(() => {});
                }
                if(window._isMobile && window.orientation && window.orientation.lock){
                    window.orientation.lock('landscape').catch(() => {});
                }
            }
            check();
            window.addEventListener('resize', check);
            window.addEventListener('orientationchange', function(){ setTimeout(check, 200); });
        })();
    </script>
    <script type="module" src="源代码/main.js?v=291"></script>
</body>
</html>
