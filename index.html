<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>骑士对决</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100vw; height: 100dvh;
            overflow: hidden;
            background: #0a0a1a;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #game-container {
            width: 100vw; height: 100dvh;
            display: flex; align-items: center; justify-content: center;
        }
        canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; max-width: 100vw; max-height: 100dvh; }
    </style>
</head>
<body>
    <div id="game-container"><canvas id="game-canvas"></canvas></div>
    <div id="version" style="position:fixed;bottom:2px;right:4px;color:rgba(255,255,255,0.15);font-size:10px;z-index:999;pointer-events:none;"></div>
    <script>
        document.getElementById('version').textContent = 'v.' + Date.now();
        window._isMobile = false;
        function checkMobile(){
            window._isMobile = ('ontouchstart' in window && window.innerWidth < 1024);
            if(window._isMobile && screen.orientation && screen.orientation.lock){
                screen.orientation.lock('landscape').catch(function(){});
            }
        }
        checkMobile();
        window.addEventListener('resize', checkMobile);
        window.addEventListener('orientationchange', function(){ setTimeout(checkMobile, 200); });
        // 动态加载防缓存
        var s = document.createElement('script');
        s.type = 'module';
        s.src = '源代码/main.js?v=' + Date.now();
        document.body.appendChild(s);
    </script>
</body>
</html>
